<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>🧪 유치원 신기한 약국 놀이 🧪</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Jua', sans-serif;
      background-color: #F0FDF4;
      touch-action: manipulation;
      -webkit-user-select: none;
      user-select: none;
      overflow: hidden; 
    }
    .btn-press:active {
      transform: scale(0.95);
    }
    .flash-bg {
      animation: flash 0.8s ease-in-out 3;
    }
    @keyframes flash {
      0%, 100% { background-color: #F0FDF4; }
      50% { background-color: #FEF08A; }
    }
    ::-webkit-scrollbar { display: none; }
    
    .selected-card {
      border-color: #10B981 !important;
      background-color: #ECFDF5 !important;
      box-shadow: 0 0 25px rgba(16, 185, 129, 0.4);
      transform: scale(1.02);
    }
    
    @keyframes liquid-wiggle {
      0%, 100% { transform: translateY(0) skewX(0); }
      50% { transform: translateY(-2px) skewX(2deg); }
    }
    .liquid-anim {
      animation: liquid-wiggle 3s ease-in-out infinite;
    }

    .slider-hue {
      background: linear-gradient(to right, #ff0000 0%, #ffff00 17%, #00ff00 33%, #00ffff 50%, #0000ff 67%, #ff00ff 83%, #ff0000 100%);
    }
    .slider-light {
      background: linear-gradient(to right, #000000 0%, #ffffff 100%);
    }
    input[type="range"] {
      -webkit-appearance: none;
      appearance: none;
      height: 24px;
      border-radius: 12px;
      outline: none;
      border: 3px solid #475569;
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: #ffffff;
      border: 4px solid #475569;
      cursor: pointer;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    }
  </style>
</head>
<body class="text-gray-800 h-[100dvh] w-screen overflow-hidden bg-[#F0FDF4] p-0 m-0 flex justify-center items-center">

  <div id="app-container" class="w-full h-[100dvh] relative overflow-hidden flex flex-col p-0 m-0">
    
    <div id="view-menu" class="absolute inset-0 flex flex-col items-center justify-center bg-[#E6F4EA] z-50 p-6">
      <h1 class="text-5xl sm:text-7xl md:text-8xl text-emerald-600 mb-6 text-center drop-shadow-md font-black whitespace-nowrap">🧪 신기한 물약 약국 🧪</h1>
      <p class="text-xl sm:text-2xl md:text-3xl text-emerald-500 mb-10 sm:mb-14 font-bold whitespace-nowrap">역할을 골라주세요!</p>
      <div class="flex flex-col sm:flex-row gap-6 sm:gap-10 w-full max-w-4xl justify-center px-6">
        <button onclick="startApp('customer')" class="btn-press flex-1 bg-emerald-400 hover:bg-emerald-500 text-white text-3xl sm:text-4xl md:text-5xl py-10 sm:py-16 px-8 rounded-[2.5rem] shadow-2xl border-b-8 border-emerald-600 flex flex-col items-center justify-center gap-4 sm:gap-6 transition-all">
          <span class="text-7xl sm:text-8xl md:text-9xl">👧👦</span>
          <span class="font-bold tracking-wide whitespace-nowrap">아픈 환자하기</span>
        </button>
        <button onclick="startApp('owner')" class="btn-press flex-1 bg-blue-400 hover:bg-blue-500 text-white text-3xl sm:text-4xl md:text-5xl py-10 sm:py-16 px-8 rounded-[2.5rem] shadow-2xl border-b-8 border-blue-600 flex flex-col items-center justify-center gap-4 sm:gap-6 transition-all">
          <span class="text-7xl sm:text-8xl md:text-9xl">💊</span>
          <span class="font-bold tracking-wide whitespace-nowrap">멋진 약사하기</span>
        </button>
      </div>
    </div>

    <div id="view-customer" class="hidden absolute inset-0 flex flex-col bg-emerald-50 z-40 h-[100dvh]">
      <div class="bg-emerald-500 text-white py-4 px-6 shadow-md grid grid-cols-3 items-center shrink-0">
        <div class="text-left">
          <button onclick="goHome()" class="text-lg sm:text-2xl md:text-3xl bg-emerald-600 py-2 px-5 rounded-2xl btn-press whitespace-nowrap">🏠 처음으로</button>
        </div>
        <div class="text-center font-bold text-xl sm:text-3xl md:text-4xl whitespace-nowrap">
          🏥 신기한 물감 물약 약국
        </div>
        <div class="text-right"></div>
      </div>
      
      <div class="bg-emerald-100 flex p-2 gap-2 shrink-0 border-b border-emerald-200">
        <button onclick="switchTab('symptom')" id="tab-symptom" class="flex-1 py-3 sm:py-4 text-2xl sm:text-3xl font-black rounded-2xl transition-all bg-white text-emerald-700 shadow-sm border border-emerald-200">
          🤕 아픈 곳 말하기
        </button>
        <button onclick="switchTab('color')" id="tab-color" class="flex-1 py-3 sm:py-4 text-2xl sm:text-3xl font-black rounded-2xl transition-all bg-transparent text-emerald-600 hover:bg-white/50">
          🧪 예쁜 물약 고르기
        </button>
      </div>

      <div id="selection-grid" class="flex-1 p-4 sm:p-6 grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-3 gap-4 sm:gap-6 h-full min-h-0 overflow-y-auto">
      </div>

      <div class="bg-white py-3 sm:py-5 px-6 sm:px-12 shadow-[0_-6px_20px_rgba(0,0,0,0.15)] shrink-0 flex justify-between items-center rounded-t-[1.5rem] sm:rounded-t-[2.5rem] border-t-4 sm:border-t-8 border-emerald-200 font-bold mb-0 pb-safe">
        <div class="text-xl sm:text-3xl md:text-4xl text-emerald-600 whitespace-nowrap flex items-center gap-3">
          <span>내가 고른 것:</span> 
          <span id="selected-text" class="text-2xl sm:text-4xl md:text-5xl text-emerald-500 font-extrabold">아직 없어요</span>
        </div>
        <button id="btn-order" onclick="submitOrder()" class="btn-press bg-emerald-500 text-white text-xl sm:text-3xl md:text-4xl font-bold py-3 sm:py-5 px-6 sm:px-12 rounded-xl sm:rounded-2xl shadow-xl border-b-4 sm:border-b-8 border-emerald-700 opacity-50 cursor-not-allowed transition-all flex items-center gap-3 whitespace-nowrap">
          <span>약사님! 처방해 주세요</span> <span>🚀</span>
        </button>
      </div>
    </div>

    <div id="view-owner" class="hidden absolute inset-0 flex flex-col bg-blue-50 z-30 h-[100dvh]">
      <div class="bg-blue-400 text-white py-4 px-6 shadow-md grid grid-cols-3 items-center shrink-0">
        <div class="text-left">
          <button onclick="goHome()" class="text-lg sm:text-2xl md:text-3xl bg-blue-500 py-2.5 px-5 rounded-2xl btn-press whitespace-nowrap">🏠 처음으로</button>
        </div>
        <div class="text-center font-bold text-xl sm:text-3xl md:text-4xl whitespace-nowrap">
          💊 신기한 약국 약사님 화면
        </div>
        <div class="text-right font-bold text-lg sm:text-2xl md:text-3xl whitespace-nowrap flex justify-end">
          <span class="bg-blue-600 py-1.5 px-4 rounded-xl">대기 환자: <span id="order-count-badge">0</span>명</span>
        </div>
      </div>

      <div id="order-list" class="flex-1 overflow-y-auto p-4 sm:p-6 flex flex-col gap-4 sm:gap-5">
        <div id="empty-orders" class="h-full flex flex-col items-center justify-center text-gray-400 text-3xl sm:text-4xl gap-4 sm:gap-6 my-auto font-bold">
          <span class="text-7xl sm:text-8xl">💤</span>
          <span class="text-gray-500 text-2xl sm:text-3xl whitespace-nowrap">기다리는 환자가 없어요!</span>
        </div>
      </div>
    </div>

    <div id="color-picker-modal" class="hidden absolute inset-0 bg-black bg-opacity-50 z-[200] flex justify-center items-center p-4">
      <div class="bg-white p-8 rounded-[3rem] shadow-2xl flex flex-col items-center gap-6 max-w-lg w-full text-center border-8 border-emerald-400">
        <h2 class="text-3xl sm:text-4xl font-black text-emerald-700 whitespace-nowrap">🎨 요술 물약 만들기</h2>
        <div id="modal-preview-bottle" class="w-40 h-40 flex items-center justify-center"></div>
        <div class="w-full flex flex-col gap-5 text-left font-bold text-xl">
          <div>
            <div class="flex justify-between mb-2">
              <span class="text-gray-700">🌈 색조 (알록달록 색깔)</span>
              <span id="label-hue" class="text-emerald-600">360</span>
            </div>
            <input type="range" id="input-hue" min="0" max="360" value="360" oninput="updateModalColor()" class="w-full slider-hue">
          </div>
          <div>
            <div class="flex justify-between mb-2">
              <span class="text-gray-700">☀️ 명도 (밝고 어두운 정도)</span>
              <span id="label-light" class="text-emerald-600">60%</span>
            </div>
            <input type="range" id="input-light" min="20" max="100" value="60" oninput="updateModalColor()" class="w-full slider-light">
          </div>
        </div>
        <button onclick="confirmCustomColor()" class="btn-press bg-emerald-500 text-white text-2xl sm:text-3xl font-bold py-4 px-10 rounded-2xl border-b-8 border-emerald-700 w-full mt-2">
          이 색깔로 물약 결정! 👍
        </button>
      </div>
    </div>

    <div id="toast-message" class="hidden absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 bg-emerald-500 text-white px-10 sm:px-16 py-6 sm:py-8 rounded-[2rem] text-3xl sm:text-4xl md:text-5xl shadow-2xl z-[100] font-bold pointer-events-none transition-all duration-300 flex flex-col items-center gap-3 sm:gap-4">
      <span class="text-6xl sm:text-7xl">🎉</span>
      <span class="text-center whitespace-nowrap">약사님께 처방전이 전달되었어요!</span>
    </div>

  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getDatabase, ref, push, onValue, remove, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyABH9wBsCqGmbPwREIQEtRO2WWnduwcUgk",
      authDomain: "water-67c64.firebaseapp.com",
      projectId: "water-67c64",
      databaseURL: "https://water-67c64-default-rtdb.firebaseio.com"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const DB_ORDERS_PATH = "kindergarten_pharmacy_orders";

    const illustrations = {
      head: `<svg viewBox="0 0 100 100" class="w-full h-full"><circle cx="50" cy="55" r="32" fill="#FFEDD5" stroke="#FDBA74" stroke-width="4"/><rect x="22" y="24" width="56" height="18" rx="4" fill="#FFFFFF" stroke="#94A3B8" stroke-width="3"/><path d="M 38 52 L 44 54 M 62 52 L 56 54" stroke="#475569" stroke-width="4"/><path d="M 40 68 Q 50 63 60 68" fill="none" stroke="#EF4444" stroke-width="4"/></svg>`,
      eye: `<svg viewBox="0 0 100 100" class="w-full h-full"><path d="M 12 50 Q 50 15 88 50 Q 50 85 12 50 Z" fill="#FFFFFF" stroke="#3B82F6" stroke-width="5"/><circle cx="50" cy="50" r="22" fill="#2563EB"/><circle cx="44" cy="42" r="7" fill="#FFFFFF"/></svg>`,
      nose: `<svg viewBox="0 0 100 100" class="w-full h-full"><circle cx="50" cy="50" r="32" fill="#FFEDD5" stroke="#FDBA74" stroke-width="4"/><circle cx="36" cy="42" r="4" fill="#475569"/><circle cx="64" cy="42" r="4" fill="#475569"/><circle cx="50" cy="53" r="14" fill="#EF4444"/></svg>`,
      cough: `<svg viewBox="0 0 100 100" class="w-full h-full"><circle cx="50" cy="50" r="32" fill="#FFEDD5" stroke="#FDBA74" stroke-width="4"/><rect x="26" y="46" width="48" height="26" rx="6" fill="#FFFFFF" stroke="#94A3B8" stroke-width="3"/></svg>`,
      fever: `<svg viewBox="0 0 100 100" class="w-full h-full"><circle cx="50" cy="50" r="32" fill="#FECACA" stroke="#EF4444" stroke-width="4"/><rect x="42" y="55" width="28" height="10" rx="3" fill="#FFFFFF" stroke="#475569" stroke-width="2" transform="rotate(-15 45 60)"/></svg>`,
      leg: `<svg viewBox="0 0 100 100" class="w-full h-full"><path d="M 25 15 L 45 15 L 45 55 L 75 55 L 75 85 L 25 85 Z" fill="#FFFFFF" stroke="#94A3B8" stroke-width="5"/><path d="M 75 70 Q 86 70 86 77 Q 86 85 75 85 Z" fill="#FFEDD5" stroke="#FDBA74" stroke-width="3"/></svg>`,
      arm: `<svg viewBox="0 0 100 100" class="w-full h-full"><path d="M 15 50 C 15 30 50 30 50 50 L 50 80 C 50 88 40 88 30 80 Z" fill="#FFFFFF" stroke="#94A3B8" stroke-width="5"/><path d="M 50 50 C 50 35 85 35 85 50 L 85 70" fill="none" stroke="#3B82F6" stroke-width="4"/></svg>`,
      stomach: `<svg viewBox="0 0 100 100" class="w-full h-full"><rect x="20" y="20" width="60" height="60" rx="18" fill="#FFEDD5" stroke="#FDBA74" stroke-width="4"/><circle cx="50" cy="65" r="4" fill="#F59E0B"/></svg>`,
      potion: (liquidColor) => `<svg viewBox="0 0 100 100" class="w-full h-full"><rect x="38" y="10" width="24" height="12" rx="4" fill="#E2E8F0" stroke="#475569" stroke-width="4" /><path d="M 43 22 L 57 22 L 62 36 L 38 36 Z" fill="#F8FAFC" stroke="#475569" stroke-width="4"/><path d="M 38 36 C 18 42 18 85 35 90 L 65 90 C 82 85 82 42 62 36 Z" fill="#FFFFFF" stroke="#475569" stroke-width="4"/><path d="M 28 55 C 28 85 36 87 50 87 C 64 87 72 85 72 55 C 72 47 28 47 28 55 Z" fill="${liquidColor}" class="liquid-anim" /></svg>`
    };

    const symptoms = [
      { id: 'head', name: '머리 아픔', svg: illustrations.head },
      { id: 'eye', name: '눈 아픔', svg: illustrations.eye },
      { id: 'nose', name: '콧물 훌쩍', svg: illustrations.nose },
      { id: 'cough', name: '콜록 기침', svg: illustrations.cough },
      { id: 'fever', name: '펄펄 열남', svg: illustrations.fever },
      { id: 'leg', name: '다리 삐끗', svg: illustrations.leg },
      { id: 'arm', name: '팔 아픔', svg: illustrations.arm },
      { id: 'stomach', name: '배탈 났어', svg: illustrations.stomach }
    ];

    const colors = [
      { id: 'white', name: '하얀 물약', hex: '#FFFFFF', svg: illustrations.potion('#F8FAFC') },
      { id: 'red', name: '빨간 물약', hex: '#EF4444', svg: illustrations.potion('#EF4444') },
      { id: 'green', name: '초록 물약', hex: '#10B981', svg: illustrations.potion('#34D399') },
      { id: 'blue', name: '파란 물약', hex: '#0EA5E9', svg: illustrations.potion('#38BDF8') },
      { id: 'custom', name: '요술 물약', hex: 'custom', svg: illustrations.potion('url(#magicGradient)') }
    ];

    let activeTab = 'symptom';
    let selectedItem = null;
    let currentRole = null;
    let customHue = 360;
    let customLight = 60; // 60% 기본값

    window.startApp = (role) => {
      currentRole = role;
      document.getElementById('view-menu').classList.add('hidden');
      if (role === 'customer') {
        document.getElementById('view-customer').classList.remove('hidden');
        switchTab('symptom');
      } else {
        document.getElementById('view-owner').classList.remove('hidden');
        startListeningToOrders();
      }
    };

    window.goHome = () => { location.reload(); };

    window.switchTab = (tab) => {
      activeTab = tab;
      document.getElementById('tab-symptom').className = tab === 'symptom' ? "flex-1 py-4 text-3xl font-black rounded-2xl bg-white text-emerald-700 shadow-sm border border-emerald-200" : "flex-1 py-4 text-3xl font-black rounded-2xl bg-transparent text-emerald-600";
      document.getElementById('tab-color').className = tab === 'color' ? "flex-1 py-4 text-3xl font-black rounded-2xl bg-white text-emerald-700 shadow-sm border border-emerald-200" : "flex-1 py-4 text-3xl font-black rounded-2xl bg-transparent text-emerald-600";
      renderSelectionView();
    };

    function renderSelectionView() {
      const grid = document.getElementById('selection-grid');
      grid.innerHTML = '';
      const items = (activeTab === 'symptom') ? symptoms : colors;
      items.forEach(item => {
        const card = document.createElement('div');
        card.className = "bg-white border-4 border-emerald-100 rounded-[2rem] p-4 flex flex-row items-center gap-6 h-40 w-full cursor-pointer transition-all";
        card.onclick = () => selectItem(item);
        let svg = item.svg;
        if(item.id === 'custom') svg = `<svg viewBox="0 0 100 100" class="w-full h-full"><defs><linearGradient id="magicGradient"><stop offset="0%" stop-color="#FF007F"/><stop offset="50%" stop-color="#FFD700"/><stop offset="100%" stop-color="#00FFFF"/></linearGradient></defs>${illustrations.potion('url(#magicGradient)')}</svg>`;
        card.innerHTML = `<div class="w-[30%] h-full flex items-center justify-center">${svg}</div><div class="flex-1 text-4xl font-black text-gray-800">${item.name}</div>`;
        grid.appendChild(card);
      });
    }

    function selectItem(item) {
      if (item.id === 'custom') {
        openCustomColorModal();
        return;
      }
      selectedItem = { ...item, type: activeTab };
      document.getElementById('selected-text').innerText = item.name;
      document.getElementById('btn-order').classList.replace('opacity-50', 'opacity-100');
      document.getElementById('btn-order').disabled = false;
    }

    function openCustomColorModal() {
      document.getElementById('input-hue').value = customHue;
      document.getElementById('input-light').value = customLight;
      updateModalColor();
      document.getElementById('color-picker-modal').classList.remove('hidden');
    }

    window.updateModalColor = () => {
      customHue = document.getElementById('input-hue').value;
      customLight = document.getElementById('input-light').value;
      document.getElementById('label-hue').innerText = customHue;
      document.getElementById('label-light').innerText = `${customLight}%`;
      const currentHsl = `hsl(${customHue}, 100%, ${customLight / 2 + 25}%)`;
      document.getElementById('modal-preview-bottle').innerHTML = illustrations.potion(currentHsl);
    };

    window.confirmCustomColor = () => {
      const finalHsl = `hsl(${customHue}, 100%, ${customLight / 2 + 25}%)`;
      selectedItem = { id: 'custom', name: '요술 물약', hex: finalHsl, type: 'color' };
      document.getElementById('selected-text').innerText = '요술 물약';
      document.getElementById('color-picker-modal').classList.add('hidden');
      document.getElementById('btn-order').classList.replace('opacity-50', 'opacity-100');
      document.getElementById('btn-order').disabled = false;
    };

    window.submitOrder = async () => {
      await push(ref(db, DB_ORDERS_PATH), { patientChoice: selectedItem, createdAt: serverTimestamp() });
      document.getElementById('toast-message').classList.remove('hidden');
      setTimeout(() => document.getElementById('toast-message').classList.add('hidden'), 2000);
    };

    function startListeningToOrders() {
      onValue(ref(db, DB_ORDERS_PATH), (snapshot) => {
        const orders = snapshot.val() ? Object.values(snapshot.val()) : [];
        const container = document.getElementById('order-list');
        document.getElementById('order-count-badge').innerText = orders.length;
        container.innerHTML = orders.length === 0 ? '<div id="empty-orders" class="text-4xl text-gray-400 font-bold mx-auto mt-20">대기 환자가 없어요!</div>' : '';
        orders.forEach((o, i) => {
          const div = document.createElement('div');
          div.className = "bg-white p-6 rounded-[2rem] shadow-lg border-4 border-blue-200 flex justify-between items-center";
          div.innerHTML = `<div class="text-3xl font-black text-gray-700">환자 ${i+1}: ${o.patientChoice.name}</div><button onclick="remove(ref(db, '${DB_ORDERS_PATH}/'+Object.keys(snapshot.val())[${i}]))" class="bg-blue-500 text-white py-4 px-8 rounded-2xl text-2xl font-bold">처방 완료</button>`;
          container.appendChild(div);
        });
      });
    }
  </script>
</body>
</html>
